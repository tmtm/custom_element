<!DOCTYPE html>
<html>
  <style>
    split-splitter {
      .knob-vertical {
        margin: auto -1px !important;
        border: solid 2px;
        width: 6px;
        height: 50px;
      }
      .knob-horizontal {
        margin: -1px auto !important;
        border: solid 2px;
        width: 50px;
        height: 6px;
      }
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@ruby/4.0-wasm-wasi@2.8.1/dist/browser.script.iife.js"></script>
  <script type="text/ruby" src="https://cdn.jsdelivr.net/gh/tmtm/jsrb@v0.1.0/jsrb.rb"></script>
  <script type="text/ruby" src="../lib/custom_element.rb"></script>
  <script type="text/ruby" src="split_panes.rb"></script>
  <body>
    <split-panes id="a" style="height:800px;width:600px" vertical>
      <split-pane id="a1" style="background-color:red;min-width:100px">
        <split-panes id="b" style="height:400px">
          <split-pane id="b1" style="background-color:blue;min-height:100px">
            0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9
          </split-pane>
          <split-pane id="b2" style="background-color:yellow;min-height:100px">
            0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9
          </split-pane>
          <split-pane id="b3" style="background-color:green;min-height:100px">
            0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9
          </split-pane>
        </split-panes>
      </split-pane>
      <split-pane id="a2" style="background-color:blue;min-width:100px">
      </split-pane>
    </split-panes>
  </body>
</html>
